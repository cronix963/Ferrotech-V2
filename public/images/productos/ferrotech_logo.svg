  <rect x="90" y="40" width="500" height="340" rx="12" fill="none" stroke="#E85D04" stroke-width="2" style="fill:none;stroke:rgb(232, 93, 4);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

